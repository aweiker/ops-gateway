name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: freebsd
            goarch: amd64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          BIN="ops-gateway-${GOOS}-${GOARCH}"
          if [ "$GOOS" = "windows" ]; then BIN="${BIN}.exe"; fi
          go build -ldflags="-s -w" -o "${BIN}" .
          sha256sum "${BIN}" > "${BIN}.sha256"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ops-gateway-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ops-gateway-*

  publish:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            ops-gateway-*
